name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly schedule runs the real-LLM quality eval against main once
  # per day at 05:00 UTC (08:00 MSK). We deliberately keep the eval
  # OFF the per-push critical path: a 17-min run against the live
  # OpenAI API is too slow, too expensive in tokens, and too
  # non-deterministic (±5–15pp recall@k drift run-to-run on temp=0.1)
  # to block merges on. Absolute floors still catch hard regressions
  # via the unit/e2e suites; the eval here catches slow quality drift
  # at a cadence where a flake doesn't ruin somebody's afternoon.
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      run_real_e2e:
        description: 'Also run the real e2e suite (requires OPENAI_API_KEY secret)'
        required: false
        default: 'false'
      run_eval:
        description: 'Also run the multi-vertical quality eval (requires OPENAI_API_KEY secret)'
        required: false
        default: 'false'

jobs:
  build-test:
    runs-on: ubuntu-latest
    # 20, not 15: now that the boot bug is fixed the e2e suite actually
    # runs to completion (it used to crash instantly), and CI gained the
    # unit + jobs-real steps. Two testcontainer lifecycles + cold installs
    # need headroom; forceExit (jest configs) prevents the post-suite hang.
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      # Unit suite (79 specs: auth guard, calibration, CAS job-claim,
      # conflict-explainer, chat-router gates, …). These were defined in
      # package.json but never wired into CI, so a regression in any of
      # them shipped green. Now a hard gate on every PR.
      - name: Unit tests
        run: pnpm test:unit

      - name: In-process e2e (testcontainers + stubs)
        run: pnpm test:e2e

      # Real-Surreal job-queue suite (CAS claim / leader lease / zombie
      # reap / backoff). No OpenAI, no SDK — pure DB correctness against
      # testcontainers. Previously matched no CI pattern and never ran.
      - name: Jobs e2e (real Surreal, no OpenAI)
        run: pnpm test:e2e:jobs

      # i18n gate — admin components must use the getMessages() pipeline,
      # never hardcoded JSX literals. See brain-landing/eslint.config.mjs
      # and § Quality gates in CONTRIBUTING.md.
      - name: Install brain-landing deps
        working-directory: brain-landing
        run: pnpm install --frozen-lockfile

      - name: i18n lint — admin components
        working-directory: brain-landing
        run: pnpm lint:i18n

      - name: Test brain-landing (sitemap + locale parity)
        working-directory: brain-landing
        run: pnpm test

  real-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_real_e2e == 'true'
    needs: build-test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Checkout inside the workspace (actions/checkout refuses paths
      # outside GITHUB_WORKSPACE since v3). Then symlink to ../inite-shared
      # so tsconfig.json's "@inite/knowledge" path alias resolves at compile
      # and test time without changing source.
      - name: Checkout inite-shared (sibling for SDK source)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.repository_owner }}/inite-shared
          path: inite-shared-checkout
          token: ${{ secrets.INITE_SHARED_PAT || github.token }}

      - name: Symlink inite-shared as sibling
        run: ln -sf "$GITHUB_WORKSPACE/inite-shared-checkout" "$GITHUB_WORKSPACE/../inite-shared"

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Real e2e (separate process + real OpenAI + SDK + MCP)
        env:
          OPENAI_API_KEY: ${{ secrets.BRAIN_OPENAI_API_KEY }}
        run: pnpm test:e2e:real

  # Multi-vertical quality eval — recall@k, MRR, extraction-recall,
  # PII gating, identity-resolution. Hard thresholds asserted inside
  # test/quality.real-e2e-spec.ts (overall AND per-vertical), so a
  # regression here fails the job. Gated on a real OPENAI_API_KEY
  # because the eval depends on production-shape extraction +
  # embedding behaviour, not stubs.
  #
  # Trigger surface — deliberately OFF push-to-main:
  #   - schedule (nightly 05:00 UTC) — slow-drift watchdog
  #   - workflow_dispatch with run_eval=true (manual, any branch)
  #
  # Why not on push to main? The live-OpenAI eval is ~17 min, non-
  # deterministic (±5–15pp recall@k drift on temp=0.1), and burns
  # tokens. Putting it on the merge critical path means every push
  # is a coin flip — see history before this change: 16/20 main
  # runs failed, almost all on eval flake or SDK-epoch drift after
  # the v4→v5 upgrade. Per-push protection is the unit/e2e suites
  # plus docker smoke; the eval is a daily watchdog, not a gate.
  quality-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Schedule and manual dispatch only. PR/push events skip this job.
    # (For dispatch the run_eval input still has to be true so an ad-
    # hoc dispatch of CI doesn't spend tokens unexpectedly.)
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_eval == 'true')
    needs: build-test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # NOTE: the old workflow checked out a sibling `inite-shared`
      # repo here to resolve the `@inite/knowledge` tsconfig alias. The
      # eval doesn't need that SDK — it speaks HTTP directly to the
      # spawned brain process via test/eval/http-brain-client.ts. We
      # deliberately stay self-contained so quality-eval doesn't
      # depend on cross-repo PAT secrets.

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile --ignore-workspace

      # Delta-gate baseline is now a FROZEN golden committed at
      # test/eval/golden-baseline.json — not a cache-restored,
      # self-promoted snapshot. The old cache flow promoted every green
      # nightly's report into the next run's baseline, so a slow ~1pp/night
      # drift within the diff tolerance ratcheted the comparison floor down
      # over time. Anchoring to a committed golden removes that ratchet: the
      # comparison reference only moves when a human re-measures and commits
      # a new golden (regen: pnpm test:eval with BRAIN_EVAL_REPORT_OUT
      # pointing at the golden path, on a clean main, under real OpenAI).
      # The absolute overall floors in test/quality.real-e2e-spec.ts (PR #31)
      # remain the hard anti-erosion anchor; this diff is the drift detector.
      - name: Quality eval (multi-vertical, real OpenAI)
        env:
          # Repo secret is `BRAIN_OPENAI_API_KEY` (org convention —
          # every inite-* service prefixes its OpenAI key with the
          # service name). The eval harness reads `OPENAI_API_KEY`,
          # so we alias.
          OPENAI_API_KEY: ${{ secrets.BRAIN_OPENAI_API_KEY }}
          # Tells the spec to write a machine-readable JSON report
          # alongside the human markdown — consumed by the diff step.
          BRAIN_EVAL_REPORT_OUT: .eval-current/report.json
        run: pnpm test:eval

      - name: Compare to frozen golden (delta-gate)
        run: |
          # Diff against the committed golden, never a cache-promoted
          # snapshot — no ratchet. eval:diff blocks on regressions beyond
          # per-metric tolerances; improvements never block.
          pnpm eval:diff test/eval/golden-baseline.json .eval-current/report.json

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build image
        run: docker build -t inite-brain-service:ci .

      - name: Smoke run
        run: |
          docker network create brain-ci
          docker run -d --name surreal --network brain-ci \
            surrealdb/surrealdb:v2.2.8 \
            start --user=root --pass=root --bind=0.0.0.0:8000 memory
          sleep 5
          docker run -d --name brain --network brain-ci -p 3030:3000 \
            -e SURREALDB_URL=ws://surreal:8000 \
            -e SURREALDB_USERNAME=root \
            -e SURREALDB_PASSWORD=root \
            -e SURREALDB_NAMESPACE=brain \
            -e SURREALDB_SCOPED_USER=brain_caller \
            -e SURREALDB_SCOPED_PASS=ci-scoped-pass \
            -e OPENAI_API_KEY=sk-ci-stub \
            -e BRAIN_API_KEYS='[]' \
            -e FORGET_HMAC_KEY=ci-hmac-key-must-be-at-least-32-chars \
            inite-brain-service:ci
          for i in $(seq 1 30); do
            if curl -fs http://localhost:3030/health >/dev/null; then
              echo "service healthy"
              curl -s http://localhost:3030/health
              exit 0
            fi
            sleep 1
          done
          echo "service did not become healthy"
          docker logs brain
          exit 1
